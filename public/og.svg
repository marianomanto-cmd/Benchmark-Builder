      <circle cx="620" cy="380" r="4"/><circle cx="720" cy="380" r="4"/><circle cx="820" cy="380" r="4"/><circle cx="920" cy="380" r="4"/><circle cx="1020" cy="380" r="4"/><circle cx="1120" cy="380" r="4"/>
      <circle cx="620" cy="460" r="4"/><circle cx="720" cy="460" r="4"/><circle cx="820" cy="460" r="4"/><circle cx="920" cy="460" r="4"/><circle cx="1020" cy="460" r="4"/><circle cx="1120" cy="460" r="4"/>
    </g>
